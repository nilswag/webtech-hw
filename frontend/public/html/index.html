<!DOCTYPE html>
<html lang="en" class="light-mode">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Home</title>

        <base href="/group20/">

        <link rel="stylesheet" href="public/css/reset.css">
        <link rel="stylesheet" href="public/css/style.css">
        <link rel="stylesheet" href="public/css/index.css">
    </head>
    <body>
        <header>
            <div class="menu__toggle">
                <input id="navigation__toggle__button" type="checkbox">
                <!-- svg copied from https://www.svgrepo.com/svg/532195/menu?edit=true with slight justifications -->
                <!-- <svg viewBox="0 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg" transform="rotate(0)matrix(1, 0, 0, 1, 0, 0)" stroke="#000000"> -->
                <svg viewBox="0 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#000000">
                    <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                    <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                    <g id="SVGRepo_iconCarrier"> 
                        <path d="M2.5 2.5H22.5M2.5 12.5H22.5M2.5 22.5H22.5" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
                    </g>
                </svg>
            </div>
            <a class="header__title" href=""><strong>America's Cup<br><span>Fan Page</span></strong></a> 
            <nav class="header__navigation">
                <a href="players">Players</a>
                <a href="teams">Teams</a>
                <a href="register" id="header__navigation__register" style="display: none;">Register</a>
                <a href="login" id="header__navigation__login" style="display: none;">Log In</a>
                <a href="logout" id="header__navigation__logout" style="display: none;">Log Out</a>
            </nav>
        </header>
        <main>
            <div id="image-carousel">
                <img src="https://emirates-team-new-zealand.americascup.com/images/m5534_crop169014_1024x576_proportional_1687747577549A.jpg" alt="Picture of Emirates Team New Zealand">
                <img src="https://emirates-team-new-zealand.americascup.com/images/m7465_crop169004_1024x576_173223360847B4.jpg" alt="Picture of Emirates Team New Zealand">
                <img src="https://www.slam.com/cdn/shop/files/Frame_213.png" alt="Picture of Emirates Team New Zealand">
                <img src="https://content.presspage.com/uploads/2431/3554eaad-0c02-40ca-8935-67bf57dc47d6/1920_251120_etnz_js0592.jpg?10000" alt="Picture of Emirates Team New Zealand">
                <img src="https://i.ytimg.com/vi/OW0fkW7HLxE/maxresdefault.jpg" alt="Picture of Emirates Team New Zealand">
            </div>
            <h1 class="body--title">The America's Cup</h1>
            <section class="event-countdown">
                <h2>Coming Event<br><span id="event-countdown--name"></span></h2>
                <div class="countdown">
                    <div class="event-countdown--units event-countdown--units__days">
                        <p>DAYS</p>
                        <p id="event-countdown--units__days"></p>
                    </div>
                    <div class="event-countdown--units event-countdown--units__hours">
                        <p>HOURS</p>
                        <p id="event-countdown--units__hours"></p>
                    </div>
                    <div class="event-countdown--units event-countdown--units__minutes">
                        <p>MINUTES</p>
                        <p id="event-countdown--units__minutes"></p>
                    </div>
                    <div class="event-countdown--units event-countdown--units__seconds">
                        <p>SECONDS</p>
                        <p id="event-countdown--units__seconds"></p>
                    </div>
                </div>
            </section>
            <section class="leaderboard">
                <table>
                    <thead>
                        <tr>
                            <th>RANK</th>
                            <th>TEAM</th>
                            <th>WINS</th>
                            <th>LOSSES</th>
                            <!-- <th>POINTS</th> -->
                            <th>WINS-LOSS DELTA</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard__body"></tbody>
                    <caption><strong>Leaderboard</strong></caption>
                </table>
            </section>
        </main>
        <footer>
           
        </footer>  
        <script src="public/js/countdown.js" type="module"></script>
        <script src="public/js/leaderboard.js" type="module"></script>  
        <script src="public/js/session.js" type="module"></script>
    </body>
</html>
