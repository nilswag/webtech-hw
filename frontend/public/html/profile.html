<!DOCTYPE html>
<html lang="en" class="light-mode">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Profile page">
        <title>Profile</title>

        <base href="/group20/">

        <link rel="stylesheet" href="public/css/reset.css">
        <link rel="stylesheet" href="public/css/style.css">
        <link rel="stylesheet" href="public/css/profile.css">

        <script defer src="public/js/session.js" type="module"></script>
        <script defer src="public/js/profile.js" type="module"></script>
    </head>
    <body>
        <header>
            <div class="menu__toggle">
                <input id="navigation__toggle__button" type="checkbox">
                <!-- svg copied from https://www.svgrepo.com/svg/532195/menu?edit=true with slight justifications -->
                <!-- <svg viewBox="0 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg" transform="rotate(0)matrix(1, 0, 0, 1, 0, 0)" stroke="#000000"> -->
                <svg viewBox="0 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#000000">
                    <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                    <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                    <g id="SVGRepo_iconCarrier"> 
                        <path d="M2.5 2.5H22.5M2.5 12.5H22.5M2.5 22.5H22.5" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
                    </g>
                </svg>
            </div>
            <a class="header__title" href=""><strong>America's Cup<br><span>Fan Page</span></strong></a> 
            <nav class="header__navigation">
                <a href="players">Players</a>
                <a href="teams">Teams</a>
                <a href="upcoming-games">Upcoming Games</a>
                <a href="register" id="header__navigation__register" style="display: none;">Register</a>
                <a href="login" id="header__navigation__login" style="display: none;">Log In</a>
                <a href="logout" id="header__navigation__logout" style="display: none;">Log Out</a>
                <a href="profile" id="header__navigation__profile">Profile</a>
            </nav>
        </header>
        <main>
            <section class="main__personal-info">
                <form class="personal-info__update">
                    <select name="favoriteTeam" id="update__favorite-team" class="update__favorite-team">
                        <option selected>Select a favorite team</option>
                    </select>
                    <div class="update__firstName">
                        <label for="firstName">First name: </label>
                        <input type="text" name="firstName" id="firstName">
                    </div>
                    <div class="update__lastName">
                        <label for="lastName">Last name: </label>
                        <input type="text" name="lastName" id="lastName">
                    </div>
                    <div class="update__email">
                        <label for="email">Email: </label>
                        <input type="email" name="email" id="email">
                    </div>
                    <div class="update__password">
                        <div class="update__password--password">
                            <label for="password">Password: </label>
                            <input type="password" name="password" id="password">
                        </div>
                        <div class="update__password--repeat">
                            <label for="password-repeat">Repeat password: </label>
                            <input type="password" name="password-repeat" id="password-repeat">
                        </div>
                    </div>
                    <button type="submit"><b>Update Information</b></button>
                </form>
            </section>
        </main>
        <footer></footer>
    </body>
</html>
