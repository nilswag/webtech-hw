<!DOCTYPE html>
<html lang="en" class="light-mode">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Login page">
        <title>Login</title>
        <link rel="stylesheet" href="css/reset.css">
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/login-form.css">
    </head>
    <body>
        <header>
            <div class="menu__toggle">
                <input id="navigation__toggle__button" type="checkbox">
                <!-- svg copied from https://www.svgrepo.com/svg/532195/menu?edit=true with slight justifications -->
                <!-- <svg viewBox="0 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg" transform="rotate(0)matrix(1, 0, 0, 1, 0, 0)" stroke="#000000"> -->
                <svg viewBox="0 0 25 25" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="#000000">
                    <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                    <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                    <g id="SVGRepo_iconCarrier"> 
                        <path d="M2.5 2.5H22.5M2.5 12.5H22.5M2.5 22.5H22.5" stroke="#000000" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
                    </g>
                </svg>
            </div>
            <a class="header__title" href=""><strong>America's Cup<br><span>Fan Page</span></strong></a> 
            <nav class="header__navigation">
                <a href="/players">Players</a>
                <a href="/teams">Teams</a>
                <a href="/register">Register</a>
                <a href="/login">Log In</a>
            </nav>
        </header>
        <main>
            <h1>Log In</h1>
            <form class="login" action="api/users/login" method="post">
                <div class="login__email">
                    <label for="email">Email: </label>
                    <input type="email" name="email" id="email" required>
                </div>
                <div class="login__password">
                    <label for="password">Password: </label>
                    <input type="password" name="password" id="password" required>
                </div>
                <button type="submit">Log in</button>
            </form>
            <p class="register--text">Don't have an account yet? <i><a href="register">Register now</a></i>!</p>
        </main>
        <footer></footer>
    </body>
</html>
