                <select name="colorMode" id="color-mode">

                    <option value="dark-mode">Dark</option>
                    <option value="custom">custom</option>
                </select>
                <div id="color-mode-screen" class="color-mode-screen--hide">
                <form action="" method="post" id="color-mode-form">
                    <div>
                        <label for="theme-name"><p>Theme name: </p></label>
                        <input type="text" name="theme name" id="theme-name" required>
                    </div>
                    <div>
                        <label for="background-color"><p>Background color: </p></label>
                        <input type="color" name="background color" id="background-color" value="#e0e0e0">
                    </div>
                    <div>
                        <label for="primary-text-color"><p>Primary text color: </p></label>
                        <input type="color" name="primary text color" id="primary-text-color" value="#1f1f1f">
                    </div>
                    <div>
                        <label for="secundary-text-color"><p>Secundary text color: </p></label>
                        <input type="color" name="secundary text color" id="secundary-text-color" value="#00b2a9">
                    </div>
                    <div>
                        <label for="primary-theme-color"><p>Primary theme color: </p></label>
                        <input type="color" name="primary theme color" id="primary-theme-color" value="#002b28">
                    </div>
                    <div>
                        <label for="secundary-theme-color"><p>Secundary theme color: </p></label>
                        <input type="color" name="secundary theme color" id="secundary-theme-color" value="#00b2a9">
                    </div>
                    <div>
                        <label for="tertiary-theme-color"><p>tertiary theme color: </p></label>
                        <input type="color" name="tertiary theme color" id="tertiary-theme-color" value="#002420">
                    </div>
                    <div>
                        <button type="button" id="cancel">Cancel</button>
                        <input type="submit" value="submit">
                    </div>
                </form>
                </div>

        <main>

                    <label for="crew-menus__select">Select the element you want to edit:</label>
                    <select class="crew-menus__select" id="crew-menus__select">
                        <option disabled selected>-- Select the elements to edit --</option>
                    </select>
                </div>
                <div class="crew-menus__input-container">
                    <label for="crew-menus__label">Specify a font size:</label>
                    <input class="crew-menus__font-size" id="crew-menus__font-size" type="number" min="12" value="12">
                </div>
                <div class="crew-menus__input-container">
                    <label for="crew-menus__font-color">Specify a font color:</label>
                    <input class="crew-menus__font-color" id="crew-menus__font-color" type="color">
                </div>
                <div class="crew-menus__input-container">
                    <label for="crew-menus__background-color">Specify a background color:</label>
                    <input class="crew-menus__background-color" id="crew-menus__background-color" type="color">
                </div>
